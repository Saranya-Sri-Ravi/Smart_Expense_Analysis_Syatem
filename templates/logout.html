<!DOCTYPE html>
<html>
<head>
    <title>Logout</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 350px;
        }

        h2 {
            margin-bottom: 10px;
        }

        p {
            color: gray;
        }

        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: black;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>You have been logged out</h2>
    <p>Redirecting to login page...</p>

    <button class="btn" onclick="goToLogin()">Go to Login</button>
</div>

<script>
    // 🔥 Clear JWT tokens
    localStorage.removeItem("access_token");
    localStorage.removeItem("refresh_token");

    console.log("JWT cleared");

    // 🔥 Auto redirect after 2 sec
    setTimeout(function() {
        window.location.href = "/accounts/login/";
    }, 2000);

    function goToLogin() {
        window.location.href = "/accounts/login/";
    }
</script>

</body>
</html>
